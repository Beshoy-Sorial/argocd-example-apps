apiVersion: batch/v1
kind: Job
metadata:
  name: presync-job
  annotations:
    arogcd.argoproj.io/hook: PreSync
    arogcd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  template:
    metadata: {}
    spec:
      restartPolicy: Never
      containers:
        - image: busybox
          name: presync-job
          command:
            - sleep
            - "10"
